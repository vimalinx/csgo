<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML5 WebGL FPS Demo (CS-like)</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel__header">
          <h1>FPS Lobby</h1>
          <div class="small" id="buildText">Local Demo</div>
        </div>

        <div id="screenLobby" class="screen">
          <p class="small">
            选择模式进入游戏。联机模式先占位，当前优先完成 AI 对战模式。
          </p>
          <div class="grid">
            <button id="btnModeAI" class="btn btn--tile">AI 对战</button>
            <button id="btnModeOnline" class="btn btn--tile btn--disabled" disabled>联机模式（占位）</button>
          </div>

          <div class="divider"></div>
          <div class="row">
            <button id="btnLobbySettings" class="btn btn--ghost">设置</button>
          </div>
        </div>

        <div id="screenAI" class="screen hidden">
          <h2>AI 对战设置</h2>
          <div class="form">
            <div class="block">
              <div class="block__title">阵营</div>
              <div class="tiles">
                <button id="teamCT" class="btn btn--tile btn--option" data-value="ct">反恐精英（CT）</button>
                <button id="teamT" class="btn btn--tile btn--option" data-value="t">恐怖分子（T）</button>
              </div>
            </div>

            <div class="block">
              <div class="block__title">AI 难度</div>
              <div class="tiles">
                <button id="diffEasy" class="btn btn--tile btn--option" data-value="easy">简单</button>
                <button id="diffNormal" class="btn btn--tile btn--option" data-value="normal">普通</button>
                <button id="diffHard" class="btn btn--tile btn--option" data-value="hard">困难</button>
              </div>
            </div>

            <div class="block">
              <div class="block__title">Bot 数量</div>
              <div class="stepper">
                <button id="botMinus" class="btn btn--ghost" aria-label="Decrease bots" disabled>-</button>
                <div class="stepper__value mono" id="botCountText">5v5</div>
                <button id="botPlus" class="btn btn--ghost" aria-label="Increase bots" disabled>+</button>
              </div>
            </div>

            <div class="block">
              <div class="block__title">模式</div>
              <div class="tiles">
                <button id="modeEndless" class="btn btn--tile btn--option hidden" data-value="endless" disabled aria-hidden="true" tabindex="-1">无限模式（兼容占位）</button>
                <button id="modeMatch" class="btn btn--tile btn--option hidden" data-value="match" disabled aria-hidden="true" tabindex="-1">对局模式（兼容占位）</button>
                <button id="modeBomb" class="btn btn--tile btn--option active" data-value="bomb">爆破模式（固定）</button>
              </div>
            </div>
          </div>

          <div class="row">
            <button id="btnStartAI" class="btn">启动游戏</button>
            <button id="btnBackToLobby" class="btn btn--ghost">返回大厅</button>
          </div>
        </div>

        <div id="screenPause" class="screen hidden">
          <h2>暂停</h2>
          <div class="row">
            <button id="btnResume" class="btn">继续</button>
            <button id="btnRestart" class="btn">重新开始</button>
          </div>
          <div class="row">
            <button id="btnPauseSettings" class="btn btn--ghost">设置</button>
            <button id="btnReturnLobby" class="btn btn--ghost">返回大厅</button>
          </div>
        </div>

        <div id="screenResult" class="screen hidden">
          <h2 id="resultTitle">Result</h2>
          <p id="resultDetail" class="small"></p>
          <div id="resultBoard" class="board mono"></div>
          <div class="row">
            <button id="btnResultRestart" class="btn">重新开始</button>
            <button id="btnResultLobby" class="btn btn--ghost">返回大厅</button>
          </div>
        </div>

        <div id="screenSettings" class="screen hidden">
          <h2>设置</h2>
          <div class="form">
            <div class="block">
              <div class="block__title">主音量</div>
              <div class="stepper">
                <button id="volMasterMinus" class="btn btn--ghost">-</button>
                <div class="stepper__value mono" id="volMasterText">40</div>
                <button id="volMasterPlus" class="btn btn--ghost">+</button>
              </div>
            </div>

            <div class="block">
              <div class="block__title">音效</div>
              <div class="stepper">
                <button id="volSfxMinus" class="btn btn--ghost">-</button>
                <div class="stepper__value mono" id="volSfxText">70</div>
                <button id="volSfxPlus" class="btn btn--ghost">+</button>
              </div>
            </div>

            <div class="block">
              <div class="block__title">音乐</div>
              <div class="stepper">
                <button id="volMusicMinus" class="btn btn--ghost">-</button>
                <div class="stepper__value mono" id="volMusicText">0</div>
                <button id="volMusicPlus" class="btn btn--ghost">+</button>
              </div>
            </div>
          </div>

          <div class="row">
            <button id="btnSettingsBack" class="btn">返回</button>
          </div>
        </div>
      </div>
    </div>

    <canvas id="gl"></canvas>

    <div id="hud" class="hud" aria-hidden="true">
      <div class="hud__top">
        <div id="status" class="status"></div>
        <div id="objective" class="objective" aria-hidden="true">
          <div class="objective__row">
            <div id="objectiveText" class="objective__text">Objective</div>
            <div id="objectiveTimer" class="objective__timer mono">0.0</div>
          </div>
          <div class="objective__track"><div id="objectiveFill" class="objective__fill"></div></div>
        </div>
      </div>
      <div class="hud__bottom">
        <div class="hud__left">
          <div class="bar">
            <span>HP</span>
            <div class="bar__track"><div id="hpBar" class="bar__fill"></div></div>
            <span id="hpText">100</span>
          </div>
          <div class="bar">
            <span>AR</span>
            <div class="bar__track"><div id="arBar" class="bar__fill bar__fill--alt"></div></div>
            <span id="arText">0</span>
          </div>
        </div>
        <div class="hud__center">
          <div class="crosshair" aria-hidden="true">
            <div class="ch ch--up"></div>
            <div class="ch ch--down"></div>
            <div class="ch ch--left"></div>
            <div class="ch ch--right"></div>
          </div>

          <div id="hitmarker" class="hitmarker" aria-hidden="true">
            <div class="hm hm--tl"></div>
            <div class="hm hm--tr"></div>
            <div class="hm hm--bl"></div>
            <div class="hm hm--br"></div>
          </div>
        </div>
        <div class="hud__right">
          <div id="weaponName" class="weapon">Pistol</div>
          <div class="ammo"><span id="ammoText">12 / 36</span></div>
          <div id="reloadWrap" class="reload" aria-hidden="true">
            <div class="reload__track"><div id="reloadBar" class="reload__fill"></div></div>
            <div id="reloadText" class="reload__text">Reloading</div>
          </div>
          <div class="small" id="tipText"></div>
        </div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
