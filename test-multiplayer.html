<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGO 多人连接测试</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .test-section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h1 {
            color: #4CAF50;
        }
        h2 {
            color: #2196F3;
            margin-top: 0;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 5px;
            background: #1a1a1a;
            color: white;
            margin: 5px;
        }
        .log {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #444;
        }
        .log-entry.success {
            border-color: #4CAF50;
            color: #4CAF50;
        }
        .log-entry.error {
            border-color: #f44336;
            color: #f44336;
        }
        .log-entry.info {
            border-color: #2196F3;
            color: #2196F3;
        }
    </style>
</head>
<body>
    <h1>🎮 CSGO 多人连接测试</h1>
    
    <div class="test-section">
        <h2>1. 连接服务器</h2>
        <div>
            <label>服务器地址：</label>
            <input type="text" id="serverUrl" value="http://123.60.21.129:3000" style="width: 300px;">
        </div>
        <div style="margin-top: 10px;">
            <button id="btnConnect" onclick="testConnect()">连接服务器</button>
            <button id="btnDisconnect" onclick="testDisconnect()" disabled>断开连接</button>
        </div>
        <div id="connectLog" class="log"></div>
    </div>

    <div class="test-section">
        <h2>2. 用户注册</h2>
        <div>
            <label>用户名：</label>
            <input type="text" id="username" placeholder="输入用户名（3-20字符）" maxlength="20" style="width: 250px;">
        </div>
        <div style="margin-top: 10px;">
            <button id="btnRegister" onclick="testRegister()" disabled>注册</button>
        </div>
        <div id="registerLog" class="log"></div>
    </div>

    <div class="test-section">
        <h2>3. 房间操作</h2>
        <div>
            <label>房间名：</label>
            <input type="text" id="roomName" placeholder="输入房间名" maxlength="50" style="width: 250px;">
        </div>
        <div style="margin-top: 10px;">
            <button id="btnCreateRoom" onclick="testCreateRoom()" disabled>创建房间</button>
            <button id="btnGetRooms" onclick="testGetRooms()" disabled>获取房间列表</button>
        </div>
        <div id="roomLog" class="log"></div>
    </div>

    <script type="module">
        import MultiplayerClient from './multiplayer.js'
        
        let multiplayer = null
        
        window.testConnect = async function() {
            const serverUrl = document.getElementById('serverUrl').value
            const log = document.getElementById('connectLog')
            
            addLog(log, '正在连接服务器: ' + serverUrl, 'info')
            
            try {
                multiplayer = new MultiplayerClient(serverUrl)
                await multiplayer.connect()
                
                addLog(log, '✅ 连接成功！', 'success')
                addLog(log, 'Player ID: ' + multiplayer.playerId, 'info')
                
                document.getElementById('btnConnect').disabled = true
                document.getElementById('btnDisconnect').disabled = false
                document.getElementById('btnRegister').disabled = false
                document.getElementById('btnGetRooms').disabled = false
                
                multiplayer.onDisconnect(() => {
                    addLog(log, '❌ 与服务器断开连接', 'error')
                    resetUI()
                })
                
                multiplayer.onError((error) => {
                    addLog(log, '❌ 错误: ' + error, 'error')
                })
                
            } catch (error) {
                addLog(log, '❌ 连接失败: ' + error.message, 'error')
            }
        }
        
        window.testDisconnect = function() {
            if (multiplayer) {
                multiplayer.disconnect()
                const log = document.getElementById('connectLog')
                addLog(log, '已断开连接', 'info')
                resetUI()
            }
        }
        
        window.testRegister = async function() {
            const username = document.getElementById('username').value.trim()
            const log = document.getElementById('registerLog')
            
            if (!username) {
                addLog(log, '❌ 请输入用户名', 'error')
                return
            }
            
            if (username.length < 3 || username.length > 20) {
                addLog(log, '❌ 用户名长度必须在3-20字符之间', 'error')
                return
            }
            
            addLog(log, '正在注册用户: ' + username, 'info')
            
            try {
                const data = await multiplayer.register(username)
                addLog(log, '✅ 注册成功！', 'success')
                addLog(log, '用户名: ' + multiplayer.username, 'info')
                
                document.getElementById('btnRegister').disabled = true
                document.getElementById('btnCreateRoom').disabled = false
            } catch (error) {
                addLog(log, '❌ 注册失败: ' + error.message, 'error')
            }
        }
        
        window.testCreateRoom = async function() {
            const roomName = document.getElementById('roomName').value.trim()
            const log = document.getElementById('roomLog')
            
            if (!roomName) {
                addLog(log, '❌ 请输入房间名', 'error')
                return
            }
            
            addLog(log, '正在创建房间: ' + roomName, 'info')
            
            try {
                const data = await multiplayer.createRoom(roomName)
                addLog(log, '✅ 房间创建成功！', 'success')
                addLog(log, 'Room ID: ' + data.roomId, 'info')
            } catch (error) {
                addLog(log, '❌ 创建房间失败: ' + error.message, 'error')
            }
        }
        
        window.testGetRooms = function() {
            const log = document.getElementById('roomLog')
            
            addLog(log, '正在获取房间列表...', 'info')
            
            multiplayer.onRoomList((rooms) => {
                if (!rooms || rooms.length === 0) {
                    addLog(log, '暂无房间', 'info')
                    return
                }
                
                addLog(log, '✅ 找到 ' + rooms.length + ' 个房间:', 'success')
                rooms.forEach(room => {
                    addLog(log, `  - ${room.name} (${room.playerCount}/${room.maxPlayers || 10})`, 'info')
                })
            })
            
            multiplayer.getRooms()
        }
        
        function addLog(logElement, message, type = 'info') {
            const entry = document.createElement('div')
            entry.className = 'log-entry ' + type
            const timestamp = new Date().toLocaleTimeString()
            entry.textContent = `[${timestamp}] ${message}`
            logElement.appendChild(entry)
            logElement.scrollTop = logElement.scrollHeight
        }
        
        function resetUI() {
            document.getElementById('btnConnect').disabled = false
            document.getElementById('btnDisconnect').disabled = true
            document.getElementById('btnRegister').disabled = true
            document.getElementById('btnCreateRoom').disabled = true
            document.getElementById('btnGetRooms').disabled = true
        }
    </script>
</body>
</html>
